<body class="bg-white text-gray-900">

            </div>

        const p = products[id];

        if (p) {
            document.title = `${p.title} | Baijie Cosmetic`;
            document.getElementById('p-title').innerText = p.title;
            document.getElementById('p-price').innerText = p.price;
            document.getElementById('p-img').src = p.img;

            p.specs.forEach(s => {
                const li = document.createElement('li');
                li.className = "flex items-start";
                li.innerHTML = `<i class="fas fa-check-circle text-pink-500 mt-1 mr-3 text-xs"></i><span>${s}</span>`;
                document.getElementById('p-specs').appendChild(li);
            });
            document.getElementById('product-container').classList.remove('opacity-0');
        } else {
            document.getElementById('not-found').classList.remove('hidden');

</body>
</html>
